name: CI/CD Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  backend-checks:
    name: Backend - Install & Prisma validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false
          submodules: false
          persist-credentials: false
          clean: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: '**/package-lock.json'

      - name: Run backend checks (auto-detect project path)
        shell: bash
        run: |
          set -euo pipefail
          projects=(
            "Group_9/EasyBuy"
            "Group_9_1SWE_WEB_Project_SS2026/EasyBuy"
          )

          found_any=0
          for project in "${projects[@]}"; do
            if [[ -f "${project}/Backend/package.json" ]]; then
              found_any=1
              echo "== Backend checks: ${project}"
              pushd "${project}/Backend" >/dev/null
              npm ci
              npx prisma validate
              npx prisma generate
              node -c src/server.js
              popd >/dev/null
            else
              echo "Skipping backend: ${project} (Backend/package.json not found)"
            fi
          done

          if [[ "${found_any}" -eq 0 ]]; then
            echo "No EasyBuy backend found in expected paths."
            echo "Expected one of:"
            printf ' - %s\n' "${projects[@]}"
            exit 1
          fi

  frontend-checks:
    name: Frontend - Install, lint, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false
          submodules: false
          persist-credentials: false
          clean: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: '**/package-lock.json'

      - name: Run frontend checks (auto-detect project path)
        shell: bash
        env:
          NEXT_PUBLIC_API_URL: https://group-9-1swe-web-project-ss2026-backend.onrender.com/api
          NEXT_PUBLIC_SOCKET_URL: https://group-9-1swe-web-project-ss2026-backend.onrender.com
          DOCKER_BUILD: 1
        run: |
          set -euo pipefail
          projects=(
            "Group_9/EasyBuy"
            "Group_9_1SWE_WEB_Project_SS2026/EasyBuy"
          )

          found_any=0
          for project in "${projects[@]}"; do
            if [[ -f "${project}/Frontend/package.json" ]]; then
              found_any=1
              echo "== Frontend checks: ${project}"
              pushd "${project}/Frontend" >/dev/null
              npm ci
              npm run lint || true
              npm run build
              popd >/dev/null
            else
              echo "Skipping frontend: ${project} (Frontend/package.json not found)"
            fi
          done

          if [[ "${found_any}" -eq 0 ]]; then
            echo "No EasyBuy frontend found in expected paths."
            echo "Expected one of:"
            printf ' - %s\n' "${projects[@]}"
            exit 1
          fi

