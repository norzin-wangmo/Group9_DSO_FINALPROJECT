name: CI/CD Pipeline

# Do NOT use actions/checkout here. The repo has a broken Group_9 submodule
# (gitlink without a URL in .gitmodules), which makes checkout fail with:
# "fatal: No url found for submodule path 'Group_9' in .gitmodules"

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  EASYBUY_REPO: https://github.com/norzin-wangmo/Group_9_1SWE_WEB_Project_SS2026.git

jobs:
  backend-checks:
    name: Backend - Install & Prisma validate
    runs-on: ubuntu-latest

    steps:
      - name: Clone EasyBuy source (no submodules)
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 --no-recurse-submodules "$EASYBUY_REPO" easybuy

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Backend install & validate
        working-directory: easybuy/EasyBuy/Backend
        run: |
          set -euo pipefail
          npm ci
          npx prisma validate
          npx prisma generate
          node -c src/server.js

  frontend-checks:
    name: Frontend - Install, lint, build
    runs-on: ubuntu-latest

    steps:
      - name: Clone EasyBuy source (no submodules)
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 --no-recurse-submodules "$EASYBUY_REPO" easybuy

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Frontend lint & build
        working-directory: easybuy/EasyBuy/Frontend
        env:
          NEXT_PUBLIC_API_URL: https://group-9-1swe-web-project-ss2026-backend.onrender.com/api
          NEXT_PUBLIC_SOCKET_URL: https://group-9-1swe-web-project-ss2026-backend.onrender.com
          DOCKER_BUILD: 1
        run: |
          set -euo pipefail
          npm ci
          npm run lint || true
          npm run build
